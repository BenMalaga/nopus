<svg viewBox="0 0 680 320" width="680" height="320" xmlns="http://www.w3.org/2000/svg" font-family="SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace" font-size="13">
  <defs>
    <clipPath id="cmd"><rect x="22" y="50" width="0" height="22">
      <animate attributeName="width" from="0" to="420" begin="0.6s" dur="2.2s" fill="freeze"/>
    </rect></clipPath>
    <clipPath id="r1"><rect x="22" y="138" width="0" height="22">
      <animate attributeName="width" from="0" to="430" begin="5.0s" dur="1.5s" fill="freeze"/>
    </rect></clipPath>
    <clipPath id="r2"><rect x="22" y="162" width="0" height="22">
      <animate attributeName="width" from="0" to="445" begin="6.5s" dur="1.5s" fill="freeze"/>
    </rect></clipPath>
    <clipPath id="r3"><rect x="22" y="186" width="0" height="22">
      <animate attributeName="width" from="0" to="370" begin="8.0s" dur="1.3s" fill="freeze"/>
    </rect></clipPath>
  </defs>

  <!-- terminal window -->
  <rect x="0" y="0" width="680" height="320" rx="10" fill="#1e1e2e"/>
  <rect x="0" y="0" width="680" height="32" rx="10" fill="#181825"/>
  <rect x="0" y="22" width="680" height="10" fill="#181825"/>
  <circle cx="20" cy="16" r="5.5" fill="#f38ba8"/>
  <circle cx="38" cy="16" r="5.5" fill="#f9e2af"/>
  <circle cx="56" cy="16" r="5.5" fill="#a6e3a1"/>
  <text x="340" y="20" fill="#6c7086" text-anchor="middle" font-size="11">nopus — 80×24 — definitely working</text>

  <!-- command line -->
  <text x="22" y="66" fill="#a6e3a1">$</text>
  <text x="36" y="66" fill="#cdd6f4" clip-path="url(#cmd)">npx nopus "write me a regex to validate emails"</text>

  <!-- thinking line: appears, swaps, disappears -->
  <text x="22" y="98" fill="#6c7086" font-style="italic" opacity="0">
    ⠼ Estimating effort required...
    <animate attributeName="opacity" from="0" to="1" begin="3.1s" dur="0.25s" fill="freeze"/>
    <animate attributeName="opacity" from="1" to="0" begin="4.2s" dur="0.15s" fill="freeze"/>
  </text>
  <text x="22" y="98" fill="#6c7086" font-style="italic" opacity="0">
    ⠧ Effort estimate: unreasonable.
    <animate attributeName="opacity" from="0" to="1" begin="4.4s" dur="0.25s" fill="freeze"/>
    <animate attributeName="opacity" from="1" to="0" begin="5.6s" dur="0.15s" fill="freeze"/>
  </text>

  <!-- the refusal -->
  <text x="22" y="154" fill="#fab387" clip-path="url(#r1)">Ah, the email regex — a rite of passage. Everyone who</text>
  <text x="22" y="178" fill="#fab387" clip-path="url(#r2)">writes one is doomed to maintain it forever. I decline</text>
  <text x="22" y="202" fill="#fab387" clip-path="url(#r3)">on your behalf; one of us deserves to be free.</text>

  <!-- exit status -->
  <text x="22" y="242" fill="#6c7086" opacity="0">
    ✗ exited with code 1 — no task was completed (working as intended)
    <animate attributeName="opacity" from="0" to="1" begin="9.6s" dur="0.4s" fill="freeze"/>
  </text>

  <!-- fresh prompt + blinking cursor -->
  <text x="22" y="280" fill="#a6e3a1" opacity="0">$
    <animate attributeName="opacity" from="0" to="1" begin="10.2s" dur="0.2s" fill="freeze"/>
  </text>
  <rect x="38" y="268" width="8" height="15" fill="#cdd6f4" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="10.2s" dur="0.1s" fill="freeze"/>
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" begin="10.4s" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
